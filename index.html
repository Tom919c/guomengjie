<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="专升本考前惊喜互动祝福页">
  <title>考前惊喜小信</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="app-shell">
    <section class="card" id="card" aria-live="polite">
      <p class="scene-tag" id="sceneTag">故事开始</p>
      <h1 class="scene-title" id="sceneTitle"></h1>
      <p class="scene-text" id="sceneText"></p>

      <div class="progress-wrap" id="progressWrap" aria-label="故事进度"></div>
      <div class="action-area" id="actionArea"></div>
      <p class="hint-text" id="hintText">小彩蛋：悄悄点标题几次试试看。</p>
    </section>

    <div class="footer-action">
      <button class="ghost-button" id="restartBtn" hidden>再看一遍</button>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
